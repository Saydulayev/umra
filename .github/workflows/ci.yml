# CI для iOS-приложения Umra
# Сборка запускается при push и pull request в main
name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Build app (iOS Simulator)
        run: |
          # Чистая сборка; отключение генерации Swift-символов ассетов избегает ошибок в CI
          xcodebuild build \
            -project umra.xcodeproj \
            -scheme umra \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0.1' \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS=NO
